{% extends "base_auth.html" %}
{% block title %}Email Sent — NewsApp{% endblock %}
{% block content %}
<div class="text-center">
  <div class="fs-1 mb-3">✉️</div>
  <h4 class="card-title mb-3">Reset Email Sent</h4>
  <p class="text-muted">If an account with email <strong>{{ email }}</strong> exists, a password reset link has been sent. Please check your inbox.</p>
  <a href="{% url 'authenticator:login' %}" class="btn btn-primary mt-2">Return to Login</a>
</div>
{% endblock %}
