{% extends "base_auth.html" %}
{% block title %}Login — NewsApp{% endblock %}
{% block content %}
<h4 class="card-title mb-4 text-center">Sign In</h4>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="POST" action="{% url 'authenticator:login' %}">
  {% csrf_token %}
  <div class="mb-3">
    <label for="username" class="form-label">Username</label>
    <input type="text" class="form-control" id="username" name="username" required>
  </div>
  <div class="mb-3">
    <label for="password" class="form-label">Password</label>
    <input type="password" class="form-control" id="password" name="password" required>
  </div>
  <div class="d-grid mb-3">
    <button type="submit" class="btn btn-primary">Login</button>
  </div>
</form>

<div class="text-center">
  <a href="{% url 'authenticator:request_password_reset' %}" class="text-muted small">Forgot your password?</a>
</div>

<hr>
<p class="text-center mb-0">Don't have an account? <a href="{% url 'authenticator:register' %}">Register here</a></p>
{% endblock %}
