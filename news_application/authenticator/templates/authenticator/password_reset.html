{% extends "base_auth.html" %}
{% block title %}Reset Password — NewsApp{% endblock %}
{% block content %}
<h4 class="card-title mb-4 text-center">Reset Password</h4>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="post" action="{% url 'authenticator:reset_password' %}">
  {% csrf_token %}
  <div class="mb-3">
    <label for="password" class="form-label">New Password</label>
    <input type="password" class="form-control" id="password" name="password" placeholder="New password" required>
  </div>
  <div class="mb-3">
    <label for="password_conf" class="form-label">Confirm New Password</label>
    <input type="password" class="form-control" id="password_conf" name="password_conf" placeholder="Confirm new password" required>
  </div>
  <div class="d-grid">
    <button type="submit" class="btn btn-primary">Reset Password</button>
  </div>
</form>
{% endblock %}
