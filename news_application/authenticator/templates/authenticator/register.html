{% extends "base_auth.html" %}
{% block title %}Register — NewsApp{% endblock %}
{% block content %}
<h4 class="card-title mb-4 text-center">Create an Account</h4>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="POST" action="{% url 'authenticator:register' %}">
  {% csrf_token %}
  <div class="mb-3">
    <label for="username" class="form-label">Username</label>
    <input type="text" class="form-control" id="username" name="username" required>
  </div>
  <div class="mb-3">
    <label for="email" class="form-label">Email</label>
    <input type="email" class="form-control" id="email" name="email" required>
  </div>
  <div class="mb-3">
    <label for="password" class="form-label">Password</label>
    <input type="password" class="form-control" id="password" name="password" required>
  </div>
  <div class="mb-3">
    <label for="password_confirm" class="form-label">Confirm Password</label>
    <input type="password" class="form-control" id="password_confirm" name="password_confirm" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Account Type</label>
    <div>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="role" id="role_reader" value="reader" required>
        <label class="form-check-label" for="role_reader">Reader</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="role" id="role_journalist" value="journalist">
        <label class="form-check-label" for="role_journalist">Journalist</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="role" id="role_editor" value="editor">
        <label class="form-check-label" for="role_editor">Editor</label>
      </div>
    </div>
  </div>
  <div class="d-grid">
    <button type="submit" class="btn btn-primary">Register</button>
  </div>
</form>

<hr>
<p class="text-center mb-0">Already have an account? <a href="{% url 'authenticator:login' %}">Login here</a></p>
{% endblock %}
