{% extends "base.html" %}
{% block title %}Edit Article — NewsApp{% endblock %}
{% block content %}
<h2 class="fw-bold mb-4">Edit Article</h2>

<form method="POST" class="row g-3">
  {% csrf_token %}

  <div class="col-12">
    <label for="title" class="form-label">Title</label>
    <input type="text" class="form-control" id="title" name="title" value="{{ article.title }}">
  </div>

  <div class="col-12">
    <label for="content" class="form-label">Content</label>
    <textarea class="form-control" id="content" name="content" rows="10">{{ article.content }}</textarea>
  </div>

  {% if request.user.groups.all.0.name == "Editor" %}
  <div class="col-12">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="approved" name="approved" {% if article.approved %}checked{% endif %}>
      <label class="form-check-label" for="approved">Approved</label>
    </div>
  </div>
  {% endif %}

  <div class="col-12">
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{% url 'main_app:article_catalogue' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
  </div>
</form>
{% endblock %}
