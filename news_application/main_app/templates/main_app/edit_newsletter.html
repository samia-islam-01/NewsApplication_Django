{% extends "base.html" %}
{% block title %}Edit Newsletter — NewsApp{% endblock %}
{% block content %}
<h2 class="fw-bold mb-4">Edit Newsletter</h2>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="POST" class="row g-3">
  {% csrf_token %}

  <div class="col-12">
    <label for="title" class="form-label">Title</label>
    <input type="text" class="form-control" id="title" name="title" value="{{ newsletter.title }}" required>
  </div>

  <div class="col-12">
    <label for="description" class="form-label">Description</label>
    <textarea class="form-control" id="description" name="description" required>{{ newsletter.description }}</textarea>
  </div>

  <div class="col-12">
    <label class="form-label">Select Articles</label>
    <div class="row g-2">
      {% for article in articles %}
      <div class="col-md-6">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="articles" value="{{ article.id }}"
            id="article_{{ article.id }}" {% if article in newsletter.articles.all %}checked{% endif %}>
          <label class="form-check-label" for="article_{{ article.id }}">{{ article.title }}</label>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>

  <div class="col-12">
    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="{% url 'main_app:newsletter_catalogue' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
  </div>
</form>
{% endblock %}
